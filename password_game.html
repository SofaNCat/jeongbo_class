<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 게임</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            margin: auto;
        }
        h1 {
            color: #333;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 18px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #rules {
            text-align: left;
            margin-top: 15px;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        #rules li {
            list-style: none;
            padding: 5px 0;
            font-size: 18px;
        }
        .valid {
            color: green;
            font-weight: bold;
        }
        .invalid {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>비밀번호 게임</h1>
        <input type="text" id="password" placeholder="비밀번호 입력">
        <button onclick="checkPassword()">확인</button>
        <ul id="rules">
            <li id="rule1" class="invalid">✔️ 최소 6자 이상</li>
            <li id="rule2" class="invalid">✔️ 숫자 포함</li>
            <li id="rule3" class="invalid">✔️ 대문자 포함</li>
            <li id="rule4" class="invalid">✔️ 특수문자 포함</li>
            <li id="rule5" class="invalid">✔️ 길이가 소수여야 함 (7, 11, 13, 17...)</li>
            <li id="rule6" class="invalid">✔️ 모든 숫자의 합이 비밀번호 길이와 같아야 함</li>
            <li id="rule7" class="invalid">✔️ 숫자의 곱이 45 이상이어야 함</li>
            <li id="rule8" class="invalid">✔️ 모음(a, e, i, o, u)이 최소 3개 포함</li>
            <li id="rule9" class="invalid">✔️ 첫 글자는 영어 대문자여야 함</li>
            <li id="rule10" class="invalid">✔️ 같은 문자는 전체적으로 최대 2번까지 사용 가능</li>
            <li id="rule11" class="invalid">✔️ 알파벳과 숫자가 번갈아가며 나와야 함</li>
        </ul>
    </div>
    <script>
        function isPrime(num) {
            if (num < 2) return false;
            for (let i = 2; i * i <= num; i++) {
                if (num % i === 0) return false;
            }
            return true;
        }

        function sumOfDigits(password) {
            return password.split('').reduce((sum, char) => {
                return sum + (/[0-9]/.test(char) ? parseInt(char) : 0);
            }, 0);
        }

        function productOfDigits(password) {
            let numbers = password.match(/[0-9]/g);
            return numbers ? numbers.reduce((prod, num) => prod * parseInt(num), 1) : 0;
        }

        function countVowels(password) {
            return (password.match(/[aeiouAEIOU]/g) || []).length;
        }

        function hasLimitedOverallRepeats(password) {
            let charCounts = {};
            for (let char of password) {
                charCounts[char] = (charCounts[char] || 0) + 1;
                if (charCounts[char] > 2) {
                    return false;
                }
            }
            return true;
        }

        function isAlternating(password) {
            for (let i = 0; i < password.length - 1; i++) {
                if ((/[a-zA-Z]/.test(password[i]) && /[a-zA-Z]/.test(password[i + 1])) ||
                    (/[0-9]/.test(password[i]) && /[0-9]/.test(password[i + 1]))) {
                    return false;
                }
            }
            return true;
        }

        function checkPassword() {
            let password = document.getElementById("password").value;
            let rules = [
                { id: "rule1", valid: password.length >= 6 },
                { id: "rule2", valid: /\d/.test(password) },
                { id: "rule3", valid: /[A-Z]/.test(password) },
                { id: "rule4", valid: /[!@#$%^&*(),.?":{}|<>]/.test(password) },
                { id: "rule5", valid: isPrime(password.length) },
                { id: "rule6", valid: sumOfDigits(password) === password.length },
                { id: "rule7", valid: productOfDigits(password) >= 45 },
                { id: "rule8", valid: countVowels(password) >= 3 },
                { id: "rule9", valid: /^[A-Z]/.test(password) },
                { id: "rule10", valid: hasLimitedOverallRepeats(password) },
                { id: "rule11", valid: isAlternating(password) }
            ];
            
            rules.forEach(rule => {
                let element = document.getElementById(rule.id);
                element.className = rule.valid ? "valid" : "invalid";
            });
        }
    </script>
</body>
</html>
