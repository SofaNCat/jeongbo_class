<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쌤이 만든 사이트 모음</title>
  <style>
    body {
      margin: 0;
      font-family: "Arial", sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 30px 25px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(6px);
    }

    .header {
      font-size: 28px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    .sub-text {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 25px;
    }

    .unit {
      margin-bottom: 28px;
      text-align: left;
    }

    .unit-title {
      font-size: 20px;
      font-weight: bold;
      color: #34495e;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #dbe4f0;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .site-button-5 {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #88c97b, #81CD72);
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 15px rgba(74, 144, 226, 0.25);
    }

    .site-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(74, 144, 226, 0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">쌤이 만든 사이트 모음</div>
    <div class="sub-text">단원별로 필요한 사이트를 눌러보세요</div>

    <div class="unit">
      <div class="unit-title">V. 디지털 문화</div>
      <div class="button-group">
        <button class="site-button-5" onclick="location.href='password_game.html'">비밀번호 게임</button>
      </div>
    </div>
  </div>
</body>
</html>
